<!DOCTYPE html>
<html lang="en" data-bs-theme="dark">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Projects | Kurapati Hruthik</title>
  <meta name="description"
    content="Explore software development and engineering projects by Kurapati Hruthik including CargoLink.">
  <!-- Bootstrap 5 CSS -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <!-- Bootstrap Icons -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
  <!-- Custom Style -->
  <link href="css/style.css?v=2" rel="stylesheet">
</head>

<body>

  <!-- Three.js Canvas Backdrop -->
  <div id="three-canvas"></div>

  <!-- Navigation Bar -->
  <nav class="navbar navbar-expand-lg navbar-dark navbar-custom sticky-top">
    <div class="container">
      <a class="navbar-brand" href="index.html">Kurapati Hruthik</a>
      <button class="navbar-toggler border-0" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav"
        aria-controls="navbarNav" aria-expanded="false" aria-label="Toggle navigation">
        <span class="navbar-toggler-icon"></span>
      </button>
      <div class="collapse navbar-collapse" id="navbarNav">
        <ul class="navbar-nav ms-auto">
          <li class="nav-item">
            <a class="nav-link" href="index.html" id="nav-home">Home</a>
          </li>
          <li class="nav-item">
            <a class="nav-link" href="about.html" id="nav-about">About</a>
          </li>
          <li class="nav-item">
            <a class="nav-link" href="projects.html" id="nav-projects">Projects</a>
          </li>
          <li class="nav-item">
            <a class="nav-link" href="contact.html" id="nav-contact">Contact</a>
          </li>
          <li class="nav-item">
            <a class="nav-link" href="admin.html" id="nav-admin">Admin</a>
          </li>
        </ul>
      </div>
    </div>
  </nav>

  <!-- Projects Grid Content -->
  <main class="container py-5" style="position: relative; z-index: 2;">

    <!-- Title -->
    <div class="text-center mb-5">
      <h1 class="display-4 fw-bold text-gradient">My Work</h1>
      <p class="text-muted">Explore system engineering designs and application developments</p>
      <div style="width: 60px; height: 3px; background: var(--accent-blue); margin: 1rem auto 0;"></div>
    </div>

    <!-- Dynamic Projects List Container -->
    <div class="row g-4" id="projects-grid">
      <!-- Programmatically injected -->
    </div>
  </main>

  <!-- Project Details Modal -->
  <div class="modal fade" id="projectDetailsModal" tabindex="-1" aria-labelledby="projectDetailsModalLabel"
    aria-hidden="true">
    <div class="modal-dialog modal-dialog-centered modal-lg">
      <div class="modal-content glass-panel text-light border-0"
        style="background: rgba(11, 15, 25, 0.95); backdrop-filter: blur(20px);">
        <div class="modal-header border-bottom border-secondary">
          <h5 class="modal-title text-info" id="projectDetailsModalLabel">Project Title</h5>
          <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal" aria-label="Close"></button>
        </div>
        <div class="modal-body py-4">
          <div class="row">
            <div class="col-md-5 mb-3 mb-md-0 d-flex align-items-center justify-content-center">
              <!-- Visual placeholder for 3D/Tech themed items -->
              <div
                class="rounded bg-dark border border-info p-4 text-center w-100 d-flex flex-column align-items-center justify-content-center"
                style="min-height: 200px;">
                <i class="bi bi-rocket-takeoff text-info display-1 mb-2"></i>
                <div class="text-info fw-bold" style="font-family: 'Orbitron', sans-serif;">KH SYSTEM INTEGRATION</div>
              </div>
            </div>
            <div class="col-md-7">
              <h6 class="text-uppercase text-info small mb-1">Description</h6>
              <p id="modal-project-desc" class="text-muted mb-4" style="line-height: 1.6;"></p>

              <h6 class="text-uppercase text-info small mb-1">Technologies Used</h6>
              <div id="modal-project-tech" class="d-flex flex-wrap gap-2 mb-4">
                <!-- Badges -->
              </div>
            </div>
          </div>
        </div>
        <div class="modal-footer border-top border-secondary">
          <button type="button" class="btn btn-secondary btn-sm" data-bs-dismiss="modal">Close</button>
          <a href="#" id="modal-project-link" class="btn btn-cyber py-1.5 px-3 btn-sm" target="_blank">Launch System</a>
        </div>
      </div>
    </div>
  </div>

  <!-- Footer -->
  <footer class="text-center text-muted">
    <div class="container">
      <p class="mb-0 small">&copy; 2026 Kurapati Hruthik</p>
    </div>
  </footer>

  <!-- Scripts -->
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
  <script src="js/storage.js"></script>
  <script src="js/three-scene.js"></script>
  <script src="js/main.js"></script>

  <script>
    // Load projects from localStorage on boot
    document.addEventListener('DOMContentLoaded', () => {
      renderProjects();
    });

    function renderProjects() {
      const grid = document.getElementById('projects-grid');
      if (!grid) return;

      const projects = getProjects();
      grid.innerHTML = '';

      if (projects.length === 0) {
        grid.innerHTML = `
          <div class="col-12 text-center py-5">
            <div class="glass-panel p-5 d-inline-block">
              <i class="bi bi-box-seam text-muted display-4 mb-3 d-block"></i>
              <h3 class="h5 text-light">No projects available</h3>
              <p class="text-muted mb-0">Check back later or add projects from the Admin panel.</p>
            </div>
          </div>
        `;
        return;
      }

      projects.forEach(proj => {
        const col = document.createElement('div');
        col.className = 'col-md-6 col-lg-6 perspective-card-wrapper';

        // Break down technologies for badge representation
        const techBadges = proj.technologies.split(',').map((t, idx) => {
          const badgeClass = idx % 2 === 0 ? 'badge-blue' : 'badge-purple';
          return `<span class="badge ${badgeClass} small me-1 mb-1">${t.trim()}</span>`;
        }).join('');

        col.innerHTML = `
          <div class="glass-panel p-4 h-100 d-flex flex-column justify-content-between tilt-card" style="transform-style: preserve-3d;">
            <div class="tilt-card-inner">
              <div class="d-flex justify-content-between align-items-center mb-3">
                <i class="bi bi-code-square text-info h3 mb-0"></i>
                <span class="badge bg-dark border border-info text-info small">Active System</span>
              </div>
              <h3 class="h4 text-light mb-2">${proj.title}</h3>
              <p class="text-muted small mb-4 line-clamp" style="display: -webkit-box; -webkit-line-clamp: 3; -webkit-box-orient: vertical; overflow: hidden;">
                ${proj.description}
              </p>
              <div class="mb-4">
                ${techBadges}
              </div>
            </div>
            <div class="d-flex justify-content-between align-items-center mt-auto">
              <button class="btn btn-sm btn-outline-info" onclick="showProjectDetails('${proj.id}')">
                <i class="bi bi-info-circle me-1"></i> Details
              </button>
              ${proj.link && proj.link !== '#' ? `
                <a href="${proj.link}" class="btn btn-cyber py-1.5 px-3 btn-sm" target="_blank">
                  Launch <i class="bi bi-arrow-up-right-square ms-1"></i>
                </a>
              ` : ''}
            </div>
          </div>
        `;
        grid.appendChild(col);
      });

      // Re-trigger 3D tilt listeners since grid items are created dynamically
      if (typeof init3dTiltEffect === 'function') {
        init3dTiltEffect();
      }
    }

    // Modal loader helper
    function showProjectDetails(id) {
      const projects = getProjects();
      const proj = projects.find(p => p.id === id);
      if (!proj) return;

      document.getElementById('projectDetailsModalLabel').textContent = proj.title;
      document.getElementById('modal-project-desc').textContent = proj.description;

      const techContainer = document.getElementById('modal-project-tech');
      techContainer.innerHTML = '';
      proj.technologies.split(',').forEach(tech => {
        const badge = document.createElement('span');
        badge.className = 'badge bg-dark border border-info text-info p-2';
        badge.textContent = tech.trim();
        techContainer.appendChild(badge);
      });

      const launchLink = document.getElementById('modal-project-link');
      if (proj.link && proj.link !== '#') {
        launchLink.setAttribute('href', proj.link);
        launchLink.style.display = 'inline-block';
      } else {
        launchLink.style.display = 'none';
      }

      const modalEl = document.getElementById('projectDetailsModal');
      const modal = new bootstrap.Modal(modalEl);
      modal.show();
    }
  </script>
</body>

</html>
